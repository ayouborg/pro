<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Factura — Module de facturation</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  :root{
    --green-dark:#0f172a;
    --green-darker:#0b1220;
    --green-mid:#334155;
    --cream:#f6f8fb;
    --paper:#ffffff;
    --ink:#0f172a;
    --muted:#64748b;
    --border:#e6e9ef;
    --accent:#2563eb;
    --accent-2:#3b82f6;
    --accent-soft:#dbeafe;
    --emerald:#059669;
    --emerald-soft:#d1fae5;
    --danger:#dc2626;
    --danger-soft:#fee2e2;
    --success:#059669;
    --success-soft:#d1fae5;
    --wait:#b45309;
    --wait-soft:#fef3c7;

    --radius-sm:9px;
    --radius-md:13px;
    --radius-lg:18px;

    --shadow-sm:0 1px 2px rgba(15,23,42,.05);
    --shadow-md:0 8px 24px rgba(15,23,42,.08);
    --shadow-lg:0 20px 50px rgba(15,23,42,.14);

    color-scheme: light;
  }
  [data-theme="dark"]{
    --cream:#0a0f1a;
    --paper:#111827;
    --ink:#e8ecf3;
    --muted:#8a96a8;
    --border:#232c3d;
    --accent:#3b82f6;
    --accent-2:#60a5fa;
    --accent-soft:#132a4d;
    --emerald:#34d399;
    --emerald-soft:#0d3b2c;
    --danger:#f87171;
    --danger-soft:#3f1d1d;
    --success:#34d399;
    --success-soft:#0d3b2c;
    --wait:#fbbf24;
    --wait-soft:#40320f;
    --shadow-sm:0 1px 2px rgba(0,0,0,.35);
    --shadow-md:0 8px 24px rgba(0,0,0,.45);
    --shadow-lg:0 20px 50px rgba(0,0,0,.55);
    color-scheme: dark;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    background:var(--cream);
    color:var(--ink);
    font-size:14px;
    line-height:1.5;
    transition: background-color .25s ease, color .25s ease;
  }
  h1,h2,h3,.serif{ font-family:'Inter',system-ui,sans-serif; letter-spacing:-.01em; }
  .mono{ font-family:ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace; letter-spacing:0; font-size:12.5px; }

  .icon{ width:16px; height:16px; display:inline-block; vertical-align:-3px; }
  .icon svg{ width:100%; height:100%; }
  .icon-btn{
    display:inline-flex; align-items:center; justify-content:center;
    width:34px; height:34px; border-radius:var(--radius-sm);
    background:transparent; border:1px solid transparent; color:var(--ink);
    cursor:pointer; transition: background-color .15s ease, border-color .15s ease, transform .1s ease;
  }
  .icon-btn:hover{ background:rgba(120,130,150,.12); }
  .icon-btn:active{ transform:scale(.94); }

  .glass{
    background: rgba(255,255,255,.66);
    backdrop-filter: blur(18px) saturate(160%);
    -webkit-backdrop-filter: blur(18px) saturate(160%);
    border:1px solid rgba(255,255,255,.55);
  }
  [data-theme="dark"] .glass{
    background: rgba(17,24,39,.55);
    border-color: rgba(255,255,255,.08);
  }

  @keyframes viewFade{ from{ opacity:0; transform:translateY(8px); } to{ opacity:1; transform:translateY(0); } }
  #main{ animation: viewFade .32s cubic-bezier(.22,1,.36,1); }

  #shell{ display:flex; min-height:100vh; }

  /* ---------- MOBILE TOPBAR ---------- */
  .mobile-topbar{
    display:none; align-items:center; gap:12px;
    padding:12px 16px; position:sticky; top:0; z-index:25;
    background:var(--paper); border-bottom:1px solid var(--border);
  }
  .mobile-topbar .name{ font-weight:700; font-size:14.5px; }
  .sidebar-backdrop{ display:none; }

  @media (max-width: 880px){
    body.app-mode .mobile-topbar{ display:flex; }
    #shell{ position:relative; }
    #sidebar{
      position:fixed; top:0; left:0; bottom:0; z-index:40;
      transform:translateX(-104%);
      box-shadow: var(--shadow-lg);
    }
    body.nav-open #sidebar{ transform:translateX(0); }
    body.nav-open .sidebar-backdrop{
      display:block; position:fixed; inset:0; z-index:35;
      background:rgba(0,0,0,.4);
    }
    #main{ padding:22px 18px; max-width:none; }
  }

  /* ---------- SIDEBAR ---------- */
  #sidebar{
    width:232px; flex-shrink:0;
    background:var(--green-dark);
    color:#e5e9f0;
    display:flex; flex-direction:column;
    padding:16px 12px;
    transition: transform .25s ease;
  }
  .brand{ display:flex; gap:9px; align-items:center; padding:4px 6px 16px 6px; border-bottom:1px solid rgba(255,255,255,.09); margin-bottom:14px;}
  .brand .logo{
    width:30px; height:30px; border-radius:8px; background:var(--accent);
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:14px; color:#fff;
    flex-shrink:0;
  }
  .brand .name{ font-weight:700; font-size:14.5px; }
  .brand .sub{ font-size:10.5px; color:#93a1b5; }

  .company-card{
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.12);
    border-radius:8px; padding:12px; margin-bottom:18px;
  }
  .company-card .cn{ font-weight:700; font-size:13px; }
  .company-card .ci{ font-size:11px; color:#a9bdb2; margin-top:3px; font-family:'IBM Plex Mono',monospace;}

  nav{ display:flex; flex-direction:column; gap:2px; flex:1; }
  .nav-item{
    display:flex; align-items:center; gap:10px;
    padding:10px 12px; border-radius:var(--radius-sm); cursor:pointer;
    color:#cfe0d6; font-size:13.5px; font-weight:500;
    border:none; border-left:3px solid transparent; background:transparent; text-align:left; width:100%;
    transition:background-color .15s ease, color .15s ease, border-color .15s ease;
  }
  .nav-item:hover{ background:rgba(255,255,255,.08); color:#fff; }
  .nav-item.active{ background:rgba(59,130,246,.16); color:#fff; font-weight:600; border-left-color:var(--accent-2); }
  .nav-item .ic{ width:18px; display:flex; align-items:center; justify-content:center; flex-shrink:0; opacity:.9; }
  .nav-item.active .ic{ opacity:1; color:var(--accent-2); }

  .sidebar-foot{ font-size:10.5px; color:#7f9188; padding:10px 8px 0 8px; border-top:1px solid rgba(255,255,255,.1); margin-top:12px;}

  /* ---------- MAIN ---------- */
  #main{ flex:1; padding:34px 42px; max-width:1180px; }
  .page-head{ margin-bottom:26px; }
  .page-head h1{ font-size:27px; margin:0 0 6px 0; font-weight:600; }
  .page-head p{ margin:0; color:var(--muted); font-size:14px; max-width:760px; }
  .row-between{ display:flex; align-items:flex-end; justify-content:space-between; gap:20px; flex-wrap:wrap; }

  /* buttons */
  .btn{
    display:inline-flex; align-items:center; gap:7px;
    border-radius:var(--radius-sm); border:1px solid var(--border);
    background:var(--paper); color:var(--ink);
    padding:9px 15px; font-size:13.5px; font-weight:600; cursor:pointer;
    font-family:inherit;
    transition: background-color .15s ease, border-color .15s ease, transform .1s ease, box-shadow .15s ease, color .15s ease;
  }
  .btn svg{ flex-shrink:0; }
  .btn:hover{ border-color:#c3cad6; box-shadow:var(--shadow-sm); }
  .btn:active{ transform:scale(.97); }
  .btn-primary{ background:var(--accent); color:#fff; border-color:var(--accent); }
  .btn-primary:hover{ background:var(--accent-2); box-shadow:0 4px 14px rgba(37,99,235,.28); }
  .btn-accent{ background:var(--emerald); color:#fff; border-color:var(--emerald); }
  .btn-accent:hover{ filter:brightness(1.08); }
  .btn-danger{ color:var(--danger); }
  .btn-sm{ padding:6px 10px; font-size:12.5px; }
  .btn-ghost{ background:transparent; border-color:transparent; color:var(--muted); }
  .btn-ghost:hover{ color:var(--ink); background:rgba(120,130,150,.1);}

  /* cards */
  .card{ background:var(--paper); border:1px solid var(--border); border-radius:var(--radius-md); box-shadow:var(--shadow-sm); transition: box-shadow .2s ease, transform .2s ease, background-color .25s ease, border-color .25s ease; }
  .cards-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:22px; }
  .stat-card{ padding:20px 20px; }
  .stat-card:hover{ box-shadow:var(--shadow-md); transform:translateY(-2px); }
  .stat-top{ display:flex; align-items:center; justify-content:space-between; }
  .stat-chip{ width:32px; height:32px; border-radius:9px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .stat-card .lbl{ font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; font-weight:600;}
  .stat-card .val{ font-size:26px; margin-top:12px; font-weight:700; letter-spacing:-.01em; }
  .stat-card .sub{ font-size:12px; color:var(--muted); margin-top:4px;}

  table{ width:100%; border-collapse:collapse; }
  th{ text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); font-weight:700; padding:10px 14px; border-bottom:1px solid var(--border); }
  td{ padding:12px 14px; border-bottom:1px solid var(--border); font-size:13.5px; vertical-align:middle;}
  tr:last-child td{ border-bottom:none; }
  tbody tr:hover{ background:#f9fafb; }

  .badge{ display:inline-block; padding:3px 10px; border-radius:20px; font-size:11.5px; font-weight:700; }
  .b-oui{ background:var(--danger-soft); color:var(--danger); }
  .b-cond{ background:var(--wait-soft); color:var(--wait); }
  .b-reco{ background:var(--accent-soft); color:#1d4ed8; }
  .b-paid{ background:var(--success-soft); color:var(--success); }
  .b-wait{ background:var(--wait-soft); color:var(--wait); }
  .b-late{ background:var(--danger-soft); color:var(--danger); }
  .b-valid{ background:var(--success-soft); color:var(--success); }
  .b-check{ background:var(--wait-soft); color:var(--wait); }
  .b-rej{ background:var(--danger-soft); color:var(--danger); }

  .section-title{ display:flex; align-items:center; gap:10px; padding:16px 18px; border-bottom:1px solid var(--border); }
  .section-title .num{ width:24px; height:24px; border-radius:50%; background:var(--accent); color:#fff; font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .section-title h3{ margin:0; font-size:15.5px; font-weight:600; }

  /* forms */
  label{ display:block; font-size:12px; font-weight:600; color:var(--muted); margin-bottom:5px; }
  input, select, textarea{
    width:100%; padding:9px 11px; border:1px solid var(--border); border-radius:7px;
    font-family:inherit; font-size:13.5px; background:var(--paper); color:var(--ink);
  }
  input:focus, select:focus, textarea:focus{ outline:2px solid var(--accent); outline-offset:1px; }
  .field{ margin-bottom:14px; }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .grid3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }
  .grid4{ display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:14px; }

  .modal-bg{ position:fixed; inset:0; background:rgba(15,23,42,.5); backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px); display:flex; align-items:flex-start; justify-content:center; padding:40px 20px; overflow:auto; z-index:50;}
  .modal{ background:var(--paper); border-radius:var(--radius-md); width:100%; max-width:840px; max-height:90vh; overflow:auto; box-shadow:var(--shadow-lg);}
  .modal-head{ display:flex; justify-content:space-between; align-items:center; padding:16px 22px; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:2;
    background:rgba(255,255,255,.72); backdrop-filter:blur(14px) saturate(160%); -webkit-backdrop-filter:blur(14px) saturate(160%); }
  [data-theme="dark"] .modal-head{ background:rgba(17,24,39,.68); }
  .modal-body{ padding:22px; }
  .close-x{ background:none; border:none; font-size:18px; cursor:pointer; color:var(--muted); }

  .empty{ text-align:center; padding:50px 20px; color:var(--muted); }
  .empty .ic{ font-size:30px; margin-bottom:10px; }

  .tag-btn{ display:inline-flex; gap:6px; align-items:center; padding:6px 12px; border-radius:20px; border:1px solid var(--border); background:var(--paper); cursor:pointer; font-size:12.5px; font-weight:600; color:var(--muted); transition:background-color .15s ease,color .15s ease,border-color .15s ease; }
  .tag-btn.active{ background:var(--accent); color:#fff; border-color:var(--accent); }

  .line-table input{ padding:7px 8px; font-size:13px; }
  .line-table td{ padding:7px 6px; }
  .totals-box{ margin-left:auto; width:280px; }
  .totals-row{ display:flex; justify-content:space-between; padding:6px 0; font-size:13.5px; }
  .totals-row.total{ border-top:1px solid var(--border); margin-top:6px; padding-top:10px; font-weight:700; font-size:16px; }

  ::placeholder{ color:#9ca3af; }

  @media print{
    #sidebar, .no-print{ display:none !important; }
    #main{ padding:0; max-width:none; }
    body{ background:#fff; }
  }
</style>
</head>

function icon(name, size){
  size = size || 18;
  const body = ICONS[name] || '';
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${body}</svg>`;
}

  }, extra||{});
}
async function sbRequest(method, table, query, body, prefer){
  const url = SUPABASE_URL + table + (query ? ('?'+query) : '');
  const res = await fetch(url, {
    method,
    headers: sbHeaders(prefer ? {'Prefer':prefer} : {}),
    body: body!==undefined ? JSON.stringify(body) : undefined
  });
  if(!res.ok){
    const txt = await res.text().catch(()=> '');
    throw new Error(`Supabase ${method} ${table} → ${res.status}: ${txt.slice(0,200)}`);
  }
  if(res.status===204) return null;
  const txt = await res.text();
  return txt ? JSON.parse(txt) : null;
}
const sbGet = (table, query='select=*') => sbRequest('GET', table, query);
const sbInsert = (table, rows) => sbRequest('POST', table, '', rows, 'return=representation');
const sbUpdate = (table, query, patch) => sbRequest('PATCH', table, query, patch, 'return=representation');
const sbDelete = (table, query) => sbRequest('DELETE', table, query);
const sbUpsert = (table, row, conflictCol) => sbRequest('POST', table, 'on_conflict='+conflictCol, row, 'resolution=merge-duplicates,return=representation');

/* ---------- Authentification (Supabase Auth) ---------- */
async function authLogin(email, password){
  const res = await fetch(SUPABASE_AUTH_URL+'token?grant_type=password', {
    method:'POST',
    headers:{ 'apikey':SUPABASE_KEY, 'Content-Type':'application/json' },
    body: JSON.stringify({email, password})
  });
  const data = await res.json();
  if(!res.ok){ throw new Error(data.error_description || data.msg || 'Identifiants invalides.'); }
  authState.accessToken = data.access_token;
  authState.user = { id: data.user.id, email: data.user.email };
}

async function fetchMyProfile(){
  const rows = await sbGet('profiles', 'select=*&id=eq.'+authState.user.id);
  if(!rows || !rows[0]){
    throw new Error("Aucun profil trouvé pour ce compte. Un administrateur doit d'abord créer votre profil (rôle) dans la base.");
  }
  authState.profile = {
    id: rows[0].id, role: rows[0].role, clientId: rows[0].client_id,
    fullName: rows[0].full_name||'', email: rows[0].email||authState.user.email
  };
  if(authState.profile.role==='client' && authState.profile.clientId){
    const crows = await sbGet('clients', 'select=*&id=eq.'+authState.profile.clientId);
    authState.myClient = crows && crows[0] ? clientFromDb(crows[0]) : null;
  }
}

function authLogout(){
  authState = { accessToken:null, user:null, profile:null, myClient:null };
  state = { company:{...defaultCompany}, clients:[], invoices:[], achats:[] };
  activeView = 'dashboard';
  venteMode = 'list';
  editingInvoiceId = null;
  dbError = null;
  showLogin();
}

async function loadAll(){
  try{
    const role = authState.profile ? authState.profile.role : null;
    const [c, cl, inv] = await Promise.all([
      sbGet('company_settings', 'select=*&id=eq.1'),
      sbGet('clients', 'select=*&order=nom.asc'),
      sbGet('invoices', 'select=*&order=date.desc'),
    ]);
    if(c && c[0]) state.company = companyFromDb(c[0]);
    else if(role==='admin'){ try{ await sbUpsert('company_settings', companyToDb(state.company), 'id'); }catch(e){ console.warn(e); } }
    state.clients = (cl||[]).map(clientFromDb);
    state.invoices = (inv||[]).map(invoiceFromDb);
    if(role==='admin' || role==='accountant'){
      const ach = await sbGet('achats', 'select=*&order=date.desc');
      state.achats = (ach||[]).map(achatFromDb);
    } else {
      state.achats = [];
    }
    dbError = null;
  }catch(e){
    console.error(e);
    dbError = "Connexion à la base de données impossible. Vérifiez que les tables et policies Supabase sont bien créées (voir console).";
  }
  ready = true;
}

function fmtMAD(n){
  n = Number(n)||0;
  return n.toLocaleString('fr-FR',{minimumFractionDigits:2, maximumFractionDigits:2}) + ' MAD';
}
function todayISO(){ return new Date().toISOString().slice(0,10); }
function fmtDate(iso){
  if(!iso) return '—';
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});
}

function render(){

  if(!allowedIds.includes(activeView)) activeView = allowedIds[0] || 'dashboard';

  renderSidebar();
  const main = document.getElementById('main');

  if(activeView==='dashboard'){ html = viewDashboard(); }
  else if(activeView==='vente'){
    html = venteMode==='form' ? viewVenteForm() : viewVenteList();
  }
  else if(activeView==='achat'){ html = viewAchat(); }
  else if(activeView==='suivi'){ html = viewSuivi(); }
  else if(activeView==='modele'){ html = viewModele(); }
  else if(activeView==='parametres'){ html = viewParametres(); }

  main.innerHTML = (dbError ? dbBanner() : '') + html;

  if(activeView==='dashboard'){ bindGlobalNavButtons(); }
  else if(activeView==='vente'){
    if(venteMode==='form'){ bindVenteForm(); } else { bindVenteList(); }
  }
  else if(activeView==='achat'){ bindAchat(); }

      <td style="width:110px;"><input class="ln-puht" type="number" min="0" step="0.01" value="${l.puht}"></td>
      <td style="width:90px;">
        <select class="ln-tva">${TVA_RATES.map(r=>`<option value="${r}" ${r===l.tva?'selected':''}>${r}%</option>`).join('')}</select>
      </td>
      <td style="width:120px;">${fmtMAD(l.qty*l.puht)}</td>
      <td style="width:36px;"><button class="btn btn-ghost btn-sm ln-del" title="Supprimer">&times;</button></td>
    </tr>
  `).join('');

  body.querySelectorAll('tr').forEach(tr=>{
    const idx = Number(tr.dataset.idx);
    tr.querySelector('.ln-desig').addEventListener('input', e=>{ draftInvoice.lines[idx].designation = e.target.value; });
    tr.querySelector('.ln-qty').addEventListener('input', e=>{ draftInvoice.lines[idx].qty = Number(e.target.value)||0; renderLines(); renderTotals(); });
    tr.querySelector('.ln-puht').addEventListener('input', e=>{ draftInvoice.lines[idx].puht = Number(e.target.value)||0; renderLines(); renderTotals(); });
    tr.querySelector('.ln-tva').addEventListener('change', e=>{ draftInvoice.lines[idx].tva = Number(e.target.value); renderTotals(); });
    tr.querySelector('.ln-del').addEventListener('click', ()=>{
      if(draftInvoice.lines.length>1){ draftInvoice.lines.splice(idx,1); renderLines(); renderTotals(); }
    });
  });
}

function computeTotals(inv){
  let totalHT=0, totalTTC=0;
  const byRate = {};
  inv.lines.forEach(l=>{
    const ht = (l.qty||0)*(l.puht||0);
    const tvaAmt = ht * (l.tva/100);
    totalHT += ht;
    totalTTC += ht+tvaAmt;
    byRate[l.tva] = (byRate[l.tva]||0) + tvaAmt;
  });
  return {totalHT, totalTTC, totalTVA: totalTTC-totalHT, byRate};
}

function renderTotals(){
  const area = document.getElementById('totalsArea');
  if(!area) return;
  const t = computeTotals(draftInvoice);
  area.innerHTML = `
    <div class="totals-row"><span>Total HT</span><span>${fmtMAD(t.totalHT)}</span></div>
    ${Object.entries(t.byRate).filter(([r,v])=>v>0).map(([r,v])=>`<div class="totals-row"><span>TVA ${r}%</span><span>${fmtMAD(v)}</span></div>`).join('')}
    <div class="totals-row total"><span>Total TTC</span><span>${fmtMAD(t.totalTTC)}</span></div>
  `;
}

async function saveInvoice(){
  const d = draftInvoice;
  if(!d.client.nom.trim()){ alert("Merci de renseigner le nom du client."); return; }
  if(d.lines.every(l=>!l.designation.trim())){ alert("Ajoutez au moins une ligne de facturation."); return; }
  const t = computeTotals(d);
  const invoice = {
    number: d.number, date: d.date, echeance: d.echeance,
    client: {...d.client}, clientId: d.clientId || null, lines: d.lines.map(l=>({...l})),
    notes: d.notes, statut: d.statut,
    totalHT: t.totalHT, totalTVA: t.totalTVA, totalTTC: t.totalTTC
  };
  const saveBtn = document.getElementById('btnSaveInvoice');
  saveBtn.disabled = true; saveBtn.textContent = 'Enregistrement…';
  try{
    // resolve or create the client record so client_id is always set when possible
    if(!invoice.clientId && invoice.client.nom.trim()){
      const existing = state.clients.find(c=>c.nom===invoice.client.nom);
      if(existing){ invoice.clientId = existing.id; }
      else{
        const crows = await sbInsert('clients', [clientToDb(invoice.client)]);
        const newClient = clientFromDb(crows[0]);
        state.clients.push(newClient);
        invoice.clientId = newClient.id;
      }
    }
    if(editingInvoiceId){
      const rows = await sbUpdate('invoices', 'id=eq.'+editingInvoiceId, invoiceToDb(invoice));
      invoice.id = editingInvoiceId;
      const idx = state.invoices.findIndex(i=>i.id===editingInvoiceId);
      if(idx>-1) state.invoices[idx] = invoice; else state.invoices.push(invoice);
    } else {
      const rows = await sbInsert('invoices', [invoiceToDb(invoice)]);
      invoice.id = rows[0].id;
      state.invoices.push(invoice);
    }
    editingInvoiceId = null;
    venteMode = 'list';
    render();
  }catch(e){
    console.error(e);
    alert("Impossible d'enregistrer la facture dans la base de données. Vérifiez que la table 'invoices' existe dans Supabase.\n\n"+e.message);
    saveBtn.disabled = false; saveBtn.textContent = editingInvoiceId ? 'Enregistrer les modifications' : 'Enregistrer la facture';
  }
}

/* ---------- Téléchargement PDF (jsPDF) ---------- */
function downloadInvoicePdf(inv){
  if(!window.jspdf){ alert("La librairie de génération PDF n'a pas pu être chargée."); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'mm', format:'a4' });
  const c = state.company;
  let y = 20;

  doc.setFontSize(14); doc.setFont(undefined,'bold');
  doc.text(c.raisonSociale||'', 14, y);
  doc.setFontSize(16);
  doc.text('FACTURE', 150, y);

  doc.setFont(undefined,'normal'); doc.setFontSize(9);
  y += 6;
  [c.adresse, `ICE ${c.ice||''} — RC ${c.rc||''} ${c.rcVille||''}`, `IF ${c.ifiscal||''} — Patente ${c.patente||''}${c.cnss?(' — CNSS '+c.cnss):''}`]
    .forEach(l=>{ doc.text(l||'', 14, y); y += 5; });

  doc.text(`N° ${inv.number}`, 150, 26);
  doc.text(`Date : ${fmtDate(inv.date)}`, 150, 31);
  if(inv.echeance) doc.text(`Échéance : ${fmtDate(inv.echeance)}`, 150, 36);

  y += 6; doc.setDrawColor(200); doc.line(14, y, 196, y); y += 7;

  doc.setFont(undefined,'bold'); doc.text('Facturé à :', 14, y); y += 5;
  doc.setFont(undefined,'normal');
  doc.text(inv.client.nom||'', 14, y); y += 5;
  if(inv.client.adresse){ doc.text(inv.client.adresse, 14, y); y += 5; }
  if(inv.client.ice || inv.client.if_){ doc.text(`ICE ${inv.client.ice||''} ${inv.client.if_?('— IF '+inv.client.if_):''}`, 14, y); y += 5; }

  y += 6;
  doc.setFont(undefined,'bold');
  doc.text('Désignation', 14, y); doc.text('Qté', 112, y); doc.text('PU HT', 130, y); doc.text('TVA', 155, y); doc.text('Montant HT', 168, y);
  y += 2; doc.line(14, y, 196, y); y += 5;
  doc.setFont(undefined,'normal');
  inv.lines.forEach(l=>{
    doc.text(String(l.designation||''), 14, y, {maxWidth:95});
    doc.text(String(l.qty), 112, y);
    doc.text(fmtMAD(l.puht), 130, y);
    doc.text(l.tva+'%', 155, y);
    doc.text(fmtMAD(l.qty*l.puht), 168, y);
    y += 6;
  });

  y += 4; doc.line(120, y, 196, y); y += 6;
  doc.text('Total HT', 130, y); doc.text(fmtMAD(inv.totalHT), 168, y); y += 6;
  doc.text('Total TVA', 130, y); doc.text(fmtMAD(inv.totalTVA), 168, y); y += 6;
  doc.setFont(undefined,'bold');
  doc.text('Total TTC', 130, y); doc.text(fmtMAD(inv.totalTTC), 168, y);

  if(inv.notes){
    y += 14; doc.setFont(undefined,'normal'); doc.setFontSize(8);
    doc.text(doc.splitTextToSize(inv.notes, 180), 14, y);
  }

  doc.save(`${inv.number}.pdf`);
}

function viewModele(){
  const sections = [

      ['Adresse du siège','texte','Oui',"Adresse complète de l'établissement facturant."],
      ["ICE (Identifiant Commun de l'Entreprise)",'15 chiffres','Oui','Obligatoire depuis 2019 sur tout document commercial et fiscal.'],
      ['N° Registre du Commerce (RC) + ville','texte','Oui','Ex. « RC 45231 Casablanca ».'],
      ['Identifiant Fiscal (IF)','texte','Oui','Délivré par la Direction Générale des Impôts.'],
      ['N° de Patente','texte','Oui','Taxe professionnelle.'],
      ['N° CNSS','texte','Si employeur',"Requis si l'entreprise emploie du personnel déclaré."],
      ['Forme juridique et capital social','texte','Recommandé','Usage courant sur les factures des sociétés (SARL, SA…).'],
    ]},
    {n:2, title:"Identification du client", rows:[
      ['Raison sociale / nom du client','texte','Oui','Nom exact du client facturé.'],
      ['Adresse du client','texte','Oui','Adresse de facturation.'],
      ['ICE du client','15 chiffres','Recommandé','Requis pour la déductibilité de la TVA côté client.'],
      ['Identifiant fiscal (IF) du client','texte','Recommandé','Utile en cas de contrôle fiscal.'],
    ]},
    {n:3, title:"En-tête de la facture", rows:[
      ['Numéro de facture','texte/mono','Oui','Séquentiel et non réutilisable (chronologie légale).'],
      ["Date d'émission",'date','Oui',"Date de facturation, base du fait générateur de TVA."],
      ["Date d'échéance",'date','Recommandé','Détermine le délai de paiement contractuel.'],
    ]},
    {n:4, title:"Lignes de facturation", rows:[
      ['Désignation','texte','Oui','Description claire du bien ou service vendu.'],
      ['Quantité','nombre','Oui','Unité vendue.'],
      ['Prix unitaire HT','décimal','Oui','Hors taxes, par unité.'],
      ['Taux de TVA','20/14/10/7/0 %','Oui','Taux applicable par ligne (peut varier par produit).'],
      ['Montant HT','calculé','Oui','Quantité × Prix unitaire HT.'],
    ]},
    {n:5, title:"Totaux", rows:[
      ['Total HT','calculé','Oui','Somme des montants HT des lignes.'],
      ['Total TVA (par taux)','calculé','Oui','Détail de la TVA collectée par taux applicable.'],
      ['Total TTC','calculé','Oui','Montant total dû, toutes taxes comprises.'],
    ]},
    {n:6, title:"Mentions complémentaires", rows:[
      ['Conditions de règlement','texte','Recommandé','Délai, mode de paiement, pénalités de retard.'],
      ['RIB / coordonnées bancaires','texte','Recommandé','Facilite le règlement par virement.'],
      ['Mention "TVA non applicable"','texte','Si exonéré','À indiquer avec la base légale si le client est exonéré.'],
    ]},
  ];
  return `
    <div class="page-head">
      <h1>Modèle de facture — champs obligatoires</h1>
      <p>Fiche de référence à usage interne — base légale : articles 145 et 146 du Code Général des Impôts marocain. Cette fiche sert de rappel pour la conformité des factures générées par le module.</p>
    </div>
    ${sections.map(s=>`
      <div class="card" style="margin-bottom:18px;">
        <div class="section-title"><div class="num">${s.n}</div><h3>${s.title}</h3></div>
        <table>
          <thead><tr><th>Champ</th><th>Type</th><th>Obligatoire</th><th>Remarque</th></tr></thead>
          <tbody>
            ${s.rows.map(r=>`
              <tr>
                <td style="font-weight:600;">${r[0]}</td>
                <td class="mono" style="color:var(--muted);">${r[1]}</td>
                <td>${obligBadge(r[2])}</td>
                <td style="color:var(--muted);">${r[3]}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `).join('')}
  `;
}
function obligBadge(v){
  if(v==='Oui') return `<span class="badge b-oui">Oui</span>`;
  if(v==='Recommandé') return `<span class="badge b-reco">Recommandé</span>`;
  return `<span class="badge b-cond">${v}</span>`;
}

const SHELL_TEMPLATE = document.getElementById('shell').innerHTML;
let loginErrorMsg = '';
let loginLoading = false;

function showLogin(){
  document.body.classList.remove('app-mode');
  document.getElementById('shell').innerHTML = `
    <div style="width:100%; min-height:100vh; display:flex; align-items:center; justify-content:center; background:
        radial-gradient(900px 480px at 15% -10%, rgba(37,99,235,.10) 0%, transparent 60%),
        radial-gradient(800px 460px at 100% 110%, rgba(5,150,105,.10) 0%, transparent 55%),
        var(--cream);">
      <div class="card glass" style="width:100%; max-width:380px; padding:30px 28px;">
        <div style="display:flex; gap:9px; align-items:center; margin-bottom:22px;">
          <div style="width:30px;height:30px;border-radius:6px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;">F</div>
          <div>
            <div style="font-weight:700; font-size:15px;">Factura</div>
            <div style="font-size:11px; color:var(--muted);">Module facturation</div>
          </div>
        </div>
        <div class="field"><label>Email</label><input id="loginEmail" type="email" placeholder="vous@exemple.com" autocomplete="username"></div>
        <div class="field"><label>Mot de passe</label><input id="loginPassword" type="password" placeholder="••••••••" autocomplete="current-password"></div>
        ${loginErrorMsg ? `<div style="background:var(--danger-soft); color:var(--danger); border-radius:6px; padding:9px 11px; font-size:12.5px; margin-bottom:14px;">${escapeHtml(loginErrorMsg)}</div>` : ''}
        <button class="btn btn-primary" id="btnLogin" style="width:100%; justify-content:center;" ${loginLoading?'disabled':''}>${loginLoading?'Connexion…':'Se connecter'}</button>
        <div style="font-size:11.5px; color:var(--muted); margin-top:16px; text-align:center;">
          Accès administrateur, comptable ou client — selon le compte configuré par votre société.
        </div>
      </div>
    </div>
  `;
  const btn = document.getElementById('btnLogin');
  const emailInput = document.getElementById('loginEmail');
  const passInput = document.getElementById('loginPassword');
  const doLogin = ()=> attemptLogin(emailInput.value.trim(), passInput.value);
  btn.addEventListener('click', doLogin);
  passInput.addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
}

async function attemptLogin(email, password){
  if(!email || !password){ loginErrorMsg = 'Merci de renseigner email et mot de passe.'; showLogin(); return; }
  loginLoading = true; loginErrorMsg=''; showLogin();
  try{
    await authLogin(email, password);
    await fetchMyProfile();
    showApp();
    await loadAll();
    render();
  }catch(e){
    console.error(e);
    loginErrorMsg = e.message || 'Connexion impossible.';
    authState = { accessToken:null, user:null, profile:null, myClient:null };
  }finally{
    loginLoading = false;
    if(!authState.accessToken) showLogin();
  }
}
